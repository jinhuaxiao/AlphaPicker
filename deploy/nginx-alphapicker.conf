# Use this when the server ALREADY runs nginx for other manualstool.com sites.
# Place at /etc/nginx/sites-available/alphapicker.manualstool.com, symlink into
# sites-enabled, then:  nginx -t && systemctl reload nginx
# TLS:  certbot --nginx -d alphapicker.manualstool.com

server {
    listen 80;
    listen [::]:80;
    server_name alphapicker.manualstool.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
